<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!--
    App-icon style logo: rounded square with the actual sunset background
    gradient, a clean paper-white T-tetromino centred (the iconic Tetris
    piece). The T-piece sits well inside the maskable safe zone (40%
    radius) so PWA icon generators don't crop it on Android.
  -->
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10406f"/>
      <stop offset="40%" stop-color="#953c97"/>
      <stop offset="75%" stop-color="#eb4982"/>
      <stop offset="100%" stop-color="#fad797"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="100" height="100" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Sunset gradient clipped to a rounded rect -->
  <g clip-path="url(#rounded)">
    <rect width="100" height="100" fill="url(#sunset)"/>
  </g>

  <!-- Outer ink border -->
  <rect x="0.5" y="0.5" width="99" height="99" rx="20" ry="20"
        fill="none" stroke="#1a0a2e" stroke-width="1"/>

  <!-- Paper-white T-tetromino, ink-outlined cells -->
  <g fill="#fff4e8" stroke="#1a0a2e" stroke-width="1.5" stroke-linejoin="miter">
    <rect x="22" y="38" width="18" height="18"/>
    <rect x="40" y="38" width="18" height="18"/>
    <rect x="58" y="38" width="20" height="18"/>
    <rect x="40" y="56" width="18" height="18"/>
  </g>

  <!-- Internal cell separators so the four blocks read as four pieces -->
  <g stroke="#1a0a2e" stroke-width="1" fill="none">
    <line x1="40" y1="38" x2="40" y2="56"/>
    <line x1="58" y1="38" x2="58" y2="56"/>
    <line x1="40" y1="56" x2="58" y2="56"/>
  </g>
</svg>
